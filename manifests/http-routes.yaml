apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-write-routes
  namespace: app3
  annotations:
    # /api/auth and /api/revoke — session-writer intercepts the response to
    # write/delete the Redis session entry. No session-validator (public routes).
    konghq.com/plugins: session-writer
spec:
  parentRefs:
  - name: kong
    namespace: app3
  rules:
  # /api/auth → /auth
  - matches:
    - path:
        type: Exact
        value: '/api/auth'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: '/auth'
    backendRefs:
    - name: auth
      kind: Service
      port: 80
  # /api/revoke → /revoke
  - matches:
    - path:
        type: Exact
        value: '/api/revoke'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: '/revoke'
    backendRefs:
    - name: auth
      kind: Service
      port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-verify-route
  namespace: app3
  # /api/verify — no plugins. Called directly by operator tooling;
  # session-validator calls the auth service directly (not through Kong).
spec:
  parentRefs:
  - name: kong
    namespace: app3
  rules:
  # /api/verify → /verify
  - matches:
    - path:
        type: Exact
        value: '/api/verify'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: '/verify'
    backendRefs:
    - name: auth
      kind: Service
      port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app3-routes
  namespace: app3
  annotations:
    # Full plugin chain: session-validator (1000) → redis-cache (100).
    konghq.com/plugins: session-validator,redis-cache
spec:
  parentRefs:
  - name: kong
    namespace: app3
  rules:
  # ── /api/vlans ───────────────────────────────────────────────────────────────
  # Exact (no trailing slash): rewrite to /vlans/ so the backend never redirects.
  - matches:
    - path:
        type: Exact
        value: '/api/vlans'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: '/vlans/'
    backendRefs:
    - name: vlan
      kind: Service
      port: 80
  # Prefix (with slash and sub-paths): strip /api, preserve remainder.
  # PathPrefix /api/vlans/ does NOT match bare /api/vlans — no priority conflict.
  - matches:
    - path:
        type: PathPrefix
        value: '/api/vlans/'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: '/vlans/'
    backendRefs:
    - name: vlan
      kind: Service
      port: 80

  # ── /api/cores ───────────────────────────────────────────────────────────────
  - matches:
    - path:
        type: Exact
        value: '/api/cores'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: '/cores/'
    backendRefs:
    - name: vlan
      kind: Service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: '/api/cores/'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: '/cores/'
    backendRefs:
    - name: vlan
      kind: Service
      port: 80

  # ── /api/vlanrestrictions ────────────────────────────────────────────────────
  - matches:
    - path:
        type: Exact
        value: '/api/vlanrestrictions'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: '/vlanrestrictions/'
    backendRefs:
    - name: vlan
      kind: Service
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: '/api/vlanrestrictions/'
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: '/vlanrestrictions/'
    backendRefs:
    - name: vlan
      kind: Service
      port: 80
