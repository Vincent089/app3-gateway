apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: session-validator
  namespace: app3
plugin: session-validator
config:
  redis_host: redis.app3.svc.cluster.local
  redis_port: 6379
  redis_timeout: 2000
  auth_service_url: http://auth.app3.svc.cluster.local
  auth_verify_timeout: 5000
---
# Replaced built-in proxy-cache (OSS memory-only) with custom redis-cache plugin
# that uses the shared Redis instance — same pattern as session-writer.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: redis-cache
  namespace: app3
plugin: redis-cache
config:
  redis_host: redis.app3.svc.cluster.local
  redis_port: 6379
  redis_timeout: 2000
  cache_ttl: 60
  request_method:
    - GET
    - HEAD
  response_code:
    - 200
  content_type:
    - application/json
    - "application/json; charset=utf-8"
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: session-writer
  namespace: app3
plugin: session-writer
config:
  redis_host: redis.app3.svc.cluster.local
  redis_port: 6379
  redis_timeout: 2000
  session_ttl: 28800
