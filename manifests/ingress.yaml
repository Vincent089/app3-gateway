# /auth and /revoke — session-writer intercepts the response to write/delete
# the Redis session entry.  No session-validator (these routes are public).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-write-routes
  namespace: app3
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: session-writer
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 80
          - path: /revoke
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 80
---
# /verify — no plugins.  Called by session-validator as an internal fallback;
# also reachable for health checks / operator tooling.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-verify-route
  namespace: app3
  annotations:
    kubernetes.io/ingress.class: kong
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /verify
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 80
---
# App3 routes — full plugin chain: session-validator → proxy-cache.
# Kong applies plugins in PRIORITY order (higher runs first);
# session-validator (1000) always runs before proxy-cache (default 100).
# DEPLOY AFTER the app3 Service exists in namespace app3 — KIC will
# crash-loop on every reconciliation tick if this backend is missing,
# blocking all plugin programming across the entire namespace.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app3-routes
  namespace: app3
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: session-validator,proxy-cache
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vlan
                port:
                  number: 80
